services:
  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/api/services || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 15

  stellar:
    image: stellar/quickstart:latest
    command: --local --limits unlimited
    ports:
      - "8000:8000"
    healthcheck:
      test: >
        curl -sf http://localhost:8000/soroban/rpc -X POST
        -H "Content-Type: application/json"
        -d '{"jsonrpc":"2.0","id":1,"method":"getHealth"}'
        | grep -q healthy
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 10s

  db:
    image: postgres:18
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: provider_platform_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d provider_platform_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  setup:
    image: ${STELLAR_CLI_IMAGE:-stellar-cli:local}
    depends_on:
      stellar:
        condition: service_healthy
    volumes:
      - ./setup.sh:/setup.sh:ro
      - ${WASM_DIR:-.}/wasms:/wasms:ro
      - shared-config:/config
    entrypoint: ["bash", "/setup.sh"]
    environment:
      STELLAR_RPC_URL: http://stellar:8000/soroban/rpc
      STELLAR_NETWORK_PASSPHRASE: "Standalone Network ; February 2017"
      FRIENDBOT_URL: http://stellar:8000/friendbot

  provider:
    image: ${PROVIDER_IMAGE:-provider-platform:local}
    depends_on:
      db:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
      jaeger:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - shared-config:/config:ro
      - ./provider-entrypoint.sh:/app/entrypoint.sh:ro
    entrypoint: ["sh", "/app/entrypoint.sh"]
    environment:
      DATABASE_URL: postgresql://admin:devpass@db:5432/provider_platform_db
      OTEL_DENO: "true"
      OTEL_SERVICE_NAME: "provider-platform"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"

  test-runner:
    image: denoland/deno:latest
    depends_on:
      provider:
        condition: service_started
      jaeger:
        condition: service_healthy
    volumes:
      - shared-config:/config:ro
      - .:/src:ro
    working_dir: /app
    environment:
      PROVIDER_URL: http://provider:3000
      STELLAR_RPC_URL: http://stellar:8000/soroban/rpc
      STELLAR_NETWORK_PASSPHRASE: "Standalone Network ; February 2017"
      FRIENDBOT_URL: http://stellar:8000/friendbot
      JAEGER_QUERY_URL: http://jaeger:16686
      OTEL_DENO: "true"
      OTEL_SERVICE_NAME: "moonlight-e2e"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      E2E_OTEL_EXPECTED: "true"
    entrypoint:
      - sh
      - -c
      - |
        cp /src/*.ts /src/deno.json . && cp /src/deno.lock . 2>/dev/null || true
        deno install
        echo "Waiting for provider..."
        for i in $(seq 1 60); do
          if deno eval "try { await fetch('$PROVIDER_URL'); Deno.exit(0) } catch { Deno.exit(1) }" 2>/dev/null; then
            echo "Provider is ready."
            break
          fi
          if [ "$i" -eq 60 ]; then echo "Provider not ready after 60s"; exit 1; fi
          sleep 2
        done
        deno run --allow-all main.ts

volumes:
  shared-config:
