name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      contracts_version:
        description: "soroban-core release tag (e.g. v0.1.0)"
        required: false
        default: "latest"
      provider_version:
        description: "provider-platform image tag (e.g. 0.2.0)"
        required: false
        default: "latest"
      stellar_cli_version:
        description: "stellar-cli image tag (e.g. 0.1.0)"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io
  ORG: ${{ github.repository_owner }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download contract wasms
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.contracts_version }}
        run: |
          mkdir -p e2e/wasms
          if [ "$VERSION" = "latest" ]; then
            gh release download --repo ${{ github.repository_owner }}/soroban-core -p '*.wasm' -D e2e/wasms/
          else
            gh release download "$VERSION" --repo ${{ github.repository_owner }}/soroban-core -p '*.wasm' -D e2e/wasms/
          fi
          ls -la e2e/wasms/

      - name: Run E2E tests
        env:
          STELLAR_CLI_IMAGE: ${{ env.REGISTRY }}/${{ env.ORG }}/stellar-cli:${{ inputs.stellar_cli_version }}
          PROVIDER_IMAGE: ${{ env.REGISTRY }}/${{ env.ORG }}/provider-platform:${{ inputs.provider_version }}
        working-directory: e2e
        run: docker compose up --abort-on-container-exit --exit-code-from test-runner
