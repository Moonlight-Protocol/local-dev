name: Invite Gate (Reusable)

on:
  workflow_call:
    inputs:
      local_dev_ref:
        description: "local-dev branch or ref (e.g. fix/my-branch). Set to the PR head ref when called from a local-dev PR; defaults to main."
        type: string
        default: "main"
      provider_console_ref:
        description: "provider-console branch or ref (e.g. feat/my-branch)"
        type: string
        default: "main"
      council_console_ref:
        description: "council-console branch or ref (e.g. feat/my-branch)"
        type: string
        default: "main"
      moonlight_pay_ref:
        description: "moonlight-pay branch or ref (e.g. feat/my-branch)"
        type: string
        default: "main"
      provider_platform_ref:
        description: "provider-platform branch or ref (e.g. feat/my-branch)"
        type: string
        default: "main"
      council_platform_ref:
        description: "council-platform branch or ref (e.g. feat/my-branch)"
        type: string
        default: "main"
      pay_platform_ref:
        description: "pay-platform branch or ref (e.g. feat/my-branch)"
        type: string
        default: "main"
    secrets:
      E2E_TRIGGER_TOKEN:
        required: true

env:
  ORG: moonlight-protocol

jobs:
  invite-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: moonlight-protocol/local-dev
          ref: ${{ inputs.local_dev_ref }}
          token: ${{ secrets.E2E_TRIGGER_TOKEN }}

      - name: Checkout provider-console
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ORG }}/provider-console
          ref: ${{ inputs.provider_console_ref }}
          token: ${{ secrets.E2E_TRIGGER_TOKEN }}
          path: provider-console

      - name: Checkout council-console
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ORG }}/council-console
          ref: ${{ inputs.council_console_ref }}
          token: ${{ secrets.E2E_TRIGGER_TOKEN }}
          path: council-console

      - name: Checkout moonlight-pay
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ORG }}/moonlight-pay
          ref: ${{ inputs.moonlight_pay_ref }}
          token: ${{ secrets.E2E_TRIGGER_TOKEN }}
          path: moonlight-pay

      - name: Checkout provider-platform
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ORG }}/provider-platform
          ref: ${{ inputs.provider_platform_ref }}
          token: ${{ secrets.E2E_TRIGGER_TOKEN }}
          path: provider-platform

      - name: Checkout council-platform
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ORG }}/council-platform
          ref: ${{ inputs.council_platform_ref }}
          token: ${{ secrets.E2E_TRIGGER_TOKEN }}
          path: council-platform

      - name: Checkout pay-platform
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ORG }}/pay-platform
          ref: ${{ inputs.pay_platform_ref }}
          token: ${{ secrets.E2E_TRIGGER_TOKEN }}
          path: pay-platform

      # The Freighter extension is loaded into Chromium via --load-extension at
      # ./playwright/freighter-extension. The directory is gitignored — devs copy
      # it from their local Chrome install. CI has no such copy, so we build it
      # from stellar/freighter at a pinned tag. Pin (rather than "latest") so a
      # Freighter release can't break invite-gate without an explicit bump here.
      - name: Cache Freighter extension build
        id: freighter-cache
        uses: actions/cache@v4
        with:
          path: playwright/freighter-extension
          key: freighter-extension-5.39.0-v1

      - name: Setup Node (for Freighter build)
        if: steps.freighter-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Freighter extension (pinned 5.39.0)
        if: steps.freighter-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          git clone --depth 1 --branch 5.39.0 https://github.com/stellar/freighter.git /tmp/freighter
          cd /tmp/freighter
          yarn install --frozen-lockfile
          yarn build:freighter-api
          yarn build:extension:production
          mkdir -p "$GITHUB_WORKSPACE/playwright/freighter-extension"
          cp -r extension/build/. "$GITHUB_WORKSPACE/playwright/freighter-extension/"

      - name: Run invite-gate tests
        env:
          PROVIDER_CONSOLE_PATH: ./provider-console
          COUNCIL_CONSOLE_PATH: ./council-console
          MOONLIGHT_PAY_PATH: ./moonlight-pay
          PROVIDER_PLATFORM_PATH: ./provider-platform
          COUNCIL_PLATFORM_PATH: ./council-platform
          PAY_PLATFORM_PATH: ./pay-platform
        run: |
          set +e
          # Pre-create the BadgerDB trace dir with permissive mode so the
          # jaeger container (non-root) can write to the bind mount. test.sh
          # does this locally; CI invokes docker compose directly so we
          # replicate the prep here.
          mkdir -p .traces/invite-gate
          chmod 777 .traces/invite-gate
          docker compose -f docker-compose.invite-gate.yml up -d
          UP_EXIT=$?
          if [ "$UP_EXIT" -ne 0 ]; then
            echo "--- docker compose up failed (exit $UP_EXIT) ---"
            echo "--- stellar logs ---"
            docker compose -f docker-compose.invite-gate.yml logs stellar
            echo "--- db logs ---"
            docker compose -f docker-compose.invite-gate.yml logs db
            docker compose -f docker-compose.invite-gate.yml down
            exit $UP_EXIT
          fi
          EXIT_CODE=$(docker wait $(docker compose -f docker-compose.invite-gate.yml ps -q test-runner))
          echo "--- provider logs ---"
          docker compose -f docker-compose.invite-gate.yml logs provider
          echo "--- council logs ---"
          docker compose -f docker-compose.invite-gate.yml logs council
          echo "--- pay logs ---"
          docker compose -f docker-compose.invite-gate.yml logs pay
          echo "--- provider-console logs ---"
          docker compose -f docker-compose.invite-gate.yml logs provider-console
          echo "--- council-console logs ---"
          docker compose -f docker-compose.invite-gate.yml logs council-console
          echo "--- moonlight-pay logs ---"
          docker compose -f docker-compose.invite-gate.yml logs moonlight-pay
          echo "--- test-runner logs ---"
          docker compose -f docker-compose.invite-gate.yml logs test-runner
          docker compose -f docker-compose.invite-gate.yml down
          exit $EXIT_CODE
